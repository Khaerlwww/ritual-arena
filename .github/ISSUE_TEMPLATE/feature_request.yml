name: Feature request
description: Suggest a product or protocol improvement
title: "feat: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user/product problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend/UI
        - Identity/Profile
        - Training
        - Arena
        - Packs/Collection
        - Marketplace
        - Staking
        - Contracts
        - DevOps/GitHub
  - type: textarea
    id: safety
    attributes:
      label: Safety / side effects
      description: Note if this needs deploy, on-chain tx, role change, data migration, or public repo sync.
